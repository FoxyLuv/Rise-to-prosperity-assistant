<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rise-To-Prosperity Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f0eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 700px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-header .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #e8b86d, #d4a954);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    .chat-header .info h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .chat-header .info p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f9f6f2;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.assistant {
      background: #fff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message.user {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
      background: #fff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #b0a090;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 16px;
      background: #fff;
      border-top: 1px solid #ece8e1;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      border: 1.5px solid #ddd6cc;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .input-area textarea:focus {
      border-color: #0f3460;
    }

    .input-area button {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: white;
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .input-area button:hover { opacity: 0.85; }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    .quick-prompts {
      padding: 8px 16px 4px;
      background: #fff;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-prompts button {
      background: #f0ece6;
      border: 1px solid #ddd6cc;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #1a1a2e;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .quick-prompts button:hover { background: #e8e0d6; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="logo">R</div>
      <div class="info">
        <h1>Rise-To-Prosperity</h1>
        <p><span class="status-dot"></span>AI Assistant — Sales & Support</p>
      </div>
    </div>

    <div class="quick-prompts" id="quickPrompts">
      <button onclick="sendQuick('Tell me about your clothing collections')">Shop clothing</button>
      <button onclick="sendQuick('How do I order a candle from Cindy\'s Scents?')">Order candles</button>
      <button onclick="sendQuick('Tell me about the Poetry & Perspective with Placide podcast')">Podcast</button>
    </div>

    <div class="messages" id="messages">
      <div class="message assistant">
        Welcome to Rise-To-Prosperity! ✨ I'm here to help you explore our collections, answer your questions, or help create content. How can I assist you today?
      </div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messages = [];

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendQuick(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('quickPrompts').style.display = 'none';

      appendMessage('user', text);
      messages.push({ role: 'user', content: text });

      const typing = showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        typing.remove();

        if (data.reply) {
          appendMessage('assistant', data.reply);
          messages.push({ role: 'assistant', content: data.reply });
        }
      } catch (err) {
        typing.remove();
        appendMessage('assistant', 'Sorry, something went wrong. Please try again.');
      }

      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    function appendMessage(role, text) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.textContent = text;
      document.getElementById('messages').appendChild(el);
      document.getElementById('messages').scrollTop = 9999;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing-indicator';
      el.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('messages').appendChild(el);
      document.getElementById('messages').scrollTop = 9999;
      return el;
    }
  </script>
</body>
</html>
